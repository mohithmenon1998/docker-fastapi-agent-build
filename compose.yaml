services:
  backend:
    build:
      context: ./backend
      dockerfile: backend.Dockerfile
    ports:
      - 8000:8000
    working_dir: /app
    # Added --reload so your app refreshes instantly on file edits
    command: uvicorn api_main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    volumes:
      # FIX: Mount the whole backend directory so api_main.py is included
      - ./backend:/app
    develop:
      watch:
        - action: rebuild
          path: backend/requirements.txt
        - action: rebuild
          path: backend/backend.Dockerfile
        - action: restart
          # FIX: Watch the entire directory instead of a missing src folder
          path: backend/
